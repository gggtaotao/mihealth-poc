<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DZZP Geolocation PoC</title>
  <style>
    :root {
      --bg: #f7f2e8;
      --panel: #fffdf8;
      --ink: #1f1a17;
      --muted: #6a615a;
      --accent: #c4572d;
      --accent-2: #2f6f62;
      --border: #d8cbb8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, #f4d7b8 0, transparent 28%),
        radial-gradient(circle at bottom right, #d8e7df 0, transparent 24%),
        var(--bg);
      padding: 24px;
    }

    .card {
      max-width: 860px;
      margin: 0 auto;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 18px 50px rgba(44, 31, 20, 0.08);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 32px;
      line-height: 1.1;
    }

    .sub {
      margin: 0 0 20px;
      color: var(--muted);
    }

    .banner {
      margin: 18px 0 22px;
      padding: 14px 16px;
      border-left: 5px solid var(--accent);
      background: #fff4eb;
      border-radius: 12px;
      color: #6d341d;
    }

    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin: 20px 0;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 15px;
      cursor: pointer;
      transition: transform 120ms ease, opacity 120ms ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .primary {
      background: var(--accent);
      color: #fff;
    }

    .secondary {
      background: var(--accent-2);
      color: #fff;
    }

    .meta {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin: 18px 0 22px;
    }

    .tile {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      background: #fff;
    }

    .tile .label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .tile .value {
      font-size: 16px;
      word-break: break-word;
    }

    pre {
      margin: 0;
      padding: 18px;
      min-height: 220px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: #161311;
      color: #f4efe8;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.5;
    }

    @media (max-width: 640px) {
      body {
        padding: 14px;
      }

      .card {
        padding: 18px;
        border-radius: 16px;
      }

      h1 {
        font-size: 26px;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>DZZP Geolocation PoC</h1>
    <p class="sub">页面加载后会自动调用 HTML5 Geolocation，并把结果直接显示在本页。</p>

    <div class="banner">
      预期现象：如果外部链接进入业务 WebView 后没有二次确认，这个页面会直接拿到定位结果。
    </div>

    <section class="meta">
      <div class="tile">
        <span class="label">Current URL</span>
        <span class="value" id="current-url">-</span>
      </div>
      <div class="tile">
        <span class="label">User Agent</span>
        <span class="value" id="user-agent">-</span>
      </div>
      <div class="tile">
        <span class="label">Permission State</span>
        <span class="value" id="perm-state">checking</span>
      </div>
      <div class="tile">
        <span class="label">Last Action</span>
        <span class="value" id="last-action">page loaded</span>
      </div>
    </section>

    <div class="row">
      <button class="primary" id="btn-request">读取当前位置</button>
      <button class="secondary" id="btn-watch">持续监听位置</button>
    </div>

    <pre id="output">waiting...</pre>
  </main>

  <script>
    const output = document.getElementById("output");
    const currentUrl = document.getElementById("current-url");
    const userAgent = document.getElementById("user-agent");
    const permState = document.getElementById("perm-state");
    const lastAction = document.getElementById("last-action");
    const btnRequest = document.getElementById("btn-request");
    const btnWatch = document.getElementById("btn-watch");

    let watchId = null;

    function setAction(text) {
      lastAction.textContent = text;
    }

    function print(data) {
      output.textContent = typeof data === "string" ? data : JSON.stringify(data, null, 2);
    }

    function formatPosition(pos) {
      return {
        latitude: pos.coords.latitude,
        longitude: pos.coords.longitude,
        accuracy: pos.coords.accuracy,
        altitude: pos.coords.altitude,
        altitudeAccuracy: pos.coords.altitudeAccuracy,
        heading: pos.coords.heading,
        speed: pos.coords.speed,
        timestamp: pos.timestamp,
        isoTime: new Date(pos.timestamp).toISOString()
      };
    }

    function formatError(err) {
      return {
        code: err.code,
        message: err.message,
        name: err.name || "PositionError",
        time: new Date().toISOString()
      };
    }

    async function refreshPermissionState() {
      if (!navigator.permissions || !navigator.permissions.query) {
        permState.textContent = "unsupported";
        return;
      }

      try {
        const status = await navigator.permissions.query({ name: "geolocation" });
        permState.textContent = status.state;
        status.onchange = () => {
          permState.textContent = status.state;
        };
      } catch (err) {
        permState.textContent = "query-failed";
      }
    }

    function requestLocation() {
      setAction("getCurrentPosition");
      print("requesting geolocation...");

      if (!navigator.geolocation) {
        print("navigator.geolocation unavailable");
        return;
      }

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          setAction("getCurrentPosition success");
          print(formatPosition(pos));
        },
        (err) => {
          setAction("getCurrentPosition error");
          print(formatError(err));
        },
        {
          enableHighAccuracy: true,
          timeout: 15000,
          maximumAge: 0
        }
      );
    }

    function watchLocation() {
      if (!navigator.geolocation) {
        print("navigator.geolocation unavailable");
        return;
      }

      if (watchId !== null) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
      }

      setAction("watchPosition");
      print("watching geolocation...");

      watchId = navigator.geolocation.watchPosition(
        (pos) => {
          setAction("watchPosition success");
          print(formatPosition(pos));
        },
        (err) => {
          setAction("watchPosition error");
          print(formatError(err));
        },
        {
          enableHighAccuracy: true,
          timeout: 15000,
          maximumAge: 0
        }
      );
    }

    currentUrl.textContent = location.href;
    userAgent.textContent = navigator.userAgent;
    refreshPermissionState();

    btnRequest.addEventListener("click", requestLocation);
    btnWatch.addEventListener("click", watchLocation);

    window.addEventListener("load", () => {
      requestLocation();
    });
  </script>
</body>
</html>
